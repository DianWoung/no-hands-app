version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        # This ARG is used during the build phase to create the vector store
        - OPENAI_API_KEY=${OPENAI_API_KEY}
    image: ai-ecommerce-backend
    container_name: ai-ecommerce-backend
    restart: unless-stopped
    env_file:
      - backend/.env.example # docker-compose will look for a .env file in the same dir
    ports:
      - "8000:8000"
    networks:
      - ecommerce-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ai-ecommerce-frontend
    container_name: ai-ecommerce-frontend
    restart: unless-stopped
    ports:
      - "3000:80" # Map host port 3000 to container port 80 (Nginx)
    depends_on:
      - backend
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge