services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        # Pass build-time variables for vector store creation
        - OPENAI_API_KEY=${OPENAI_API_KEY}
        - OPENAI_API_BASE=${OPENAI_API_BASE}
        - OPENAI_EMBEDDINGS_MODEL_NAME=${OPENAI_EMBEDDINGS_MODEL_NAME}
        - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER}
        - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
        - OLLAMA_EMBEDDINGS_MODEL_NAME=${OLLAMA_EMBEDDINGS_MODEL_NAME}
    image: ai-ecommerce-backend
    container_name: ai-ecommerce-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    networks:
      - ecommerce-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ai-ecommerce-frontend
    container_name: ai-ecommerce-frontend
    restart: unless-stopped
    ports:
      - "3000:80" # Map host port 3000 to container port 80 (Nginx)
    depends_on:
      - backend
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge

volumes:
  ollama_data: